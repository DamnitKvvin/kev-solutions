<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Kev Solutions™</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-white">
    <!-- Navbar -->

    <section class="pt-32 pb-24 max-w-2xl mx-auto px-6">
        <h1 class="text-5xl font-bold text-center mb-10">Get in Touch</h1>
        
        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="space-y-6">
            <div>
                <input type="text" name="name" placeholder="Your Name" required
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <input type="email" name="email" placeholder="Email Address" required
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <textarea name="message" rows="6" placeholder="Your Message" required
                          class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500"></textarea>
            </div>
            <button type="submit" 
                    class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold text-lg transition">
                Send Message
            </button>
        </form>
    </section>

    <footer class="bg-black py-12 text-center text-zinc-500 text-sm">© 2026 Kev Solutions™</footer>
</body>
</html>
